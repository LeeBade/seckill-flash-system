# 99-seckill.conf — 秒杀系统内核参数优化
# 部署到 /etc/sysctl.d/99-seckill.conf，执行 sysctl -p 生效

# ── TCP 监听队列 ──
# 内核层面接纳 SYN 包的能力，覆盖范围包括全连接队列 (accept queue) 和半连接队列 (syn backlog)
net.core.somaxconn = 65535

# 半连接队列最大长度——防止 SYN Flood 填满队列导致正常用户丢弃
net.ipv4.tcp_max_syn_backlog = 65535

# 全连接队列溢出行为——=1 时内核直接发送 RST 而非静默丢弃，前端立刻感知失败
# 秒杀高并发下必须开启，否则用户 TCP 超时等待数秒才报错
net.ipv4.tcp_abort_on_overflow = 1

# ── TIME_WAIT 复用 ──
# 允许将 TIME_WAIT 状态的 socket 用于新的 TCP 连接（客户端模式有效）
net.ipv4.tcp_tw_reuse = 1

# ── 本地端口范围 ──
# 扩大临时端口范围，支持更多出站连接
net.ipv4.ip_local_port_range = 1024 65535
